<!doctype html>
<html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>App Turnos Pro v0.8</title>
<meta name="theme-color" content="#8a1a86">
<style>
:root{--renfe:#8a1a86;--renfe2:#a43aa0;--work:#efd9f5;--work2:#e6c7ef;--workText:#4b0754;--dd:#ffdce5;--ddText:#d4001a;--rest:#dcfce7;--restText:#166534;--vac:#dff5ff;--manual:#ffeaa7;--bg:#f7f7fb;--card:#fff;--text:#1d1420;--muted:#75657b;--line:#eadfec;--shadow:0 12px 30px rgba(65,20,80,.08)}
body.dark{--bg:#0d0b12;--card:#17111c;--text:#faf5ff;--muted:#b9a8bf;--line:#302238;--work:#40204b;--work2:#4c245a;--workText:#f7d7ff;--rest:#12351f;--restText:#bbf7d0;--dd:#4a1320;--ddText:#ff9caf;--vac:#133342;--manual:#60490c}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;padding-bottom:76px} .app{max-width:1280px;margin:0 auto}
header{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)} body.dark header{background:rgba(13,11,18,.88)} .top{height:62px;display:flex;align-items:center;gap:18px;padding:0 18px} .brand{display:flex;align-items:baseline;gap:16px;font-weight:900} .renfe{font-style:italic;font-size:32px;color:var(--renfe);letter-spacing:-1px} h1{font-size:20px;margin:0} .version{font-size:12px;color:var(--renfe)} .topspacer{flex:1} .iconbtn,.btn{border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text);padding:10px 12px;font-weight:800} .btn.primary{background:linear-gradient(135deg,var(--renfe),var(--renfe2));color:white;border:0} .btn.ghost{background:transparent} .layout{display:grid;grid-template-columns:230px minmax(0,1fr) 285px;gap:18px;padding:16px}
aside{position:sticky;top:78px;align-self:start} .sidecard,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)} .sidecard{padding:10px} .navitem{display:flex;align-items:center;gap:10px;padding:12px;border-radius:12px;cursor:pointer;color:var(--text);font-weight:700} .navitem.active{background:var(--work);color:var(--renfe)} .sidefoot{margin-top:16px;padding:14px;border:1px solid var(--line);border-radius:16px;background:linear-gradient(180deg,#fff,#fbf5ff)} body.dark .sidefoot{background:#17111c}
main{min-width:0} .card{padding:14px;margin-bottom:12px} .row{display:flex;gap:10px;align-items:center;flex-wrap:wrap} .between{justify-content:space-between} .muted{color:var(--muted)} .small{font-size:12px} h2{margin:0 0 8px;font-size:22px} h3{margin:0 0 8px} .hidden{display:none!important}
.calhead{display:flex;align-items:center;justify-content:center;gap:18px;margin:10px 0 18px} .monthtitle{font-size:27px;font-weight:900;text-transform:capitalize} .calendar{background:var(--card);border:1px solid var(--line);border-radius:18px;overflow:hidden} .dowgrid,.grid{display:grid;grid-template-columns:repeat(7,1fr)} .dow{text-align:center;padding:10px 4px;font-size:12px;font-weight:900;color:#50445a;border-bottom:1px solid var(--line)} body.dark .dow{color:var(--muted)} .day{min-height:104px;border-right:1px solid var(--line);border-bottom:1px solid var(--line);padding:9px;cursor:pointer;position:relative;background:var(--card)} .day:nth-child(7n){border-right:0} .day:hover{box-shadow:inset 0 0 0 2px rgba(138,26,134,.18)} .day.selected{box-shadow:inset 0 0 0 3px var(--renfe)} .n{font-weight:900;font-size:14px} .turnnum{margin-top:7px;text-align:center;font-weight:1000;font-size:17px;letter-spacing:.2px;color:#2f1538}.turnbox{margin-top:4px;border-radius:9px;padding:8px 6px;text-align:center;font-weight:900;line-height:1.35;font-size:13px;min-height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center} .work .turnbox{background:linear-gradient(180deg,var(--work),var(--work2));color:var(--workText);border:1px solid #d9aee5} .rest .turnbox{background:var(--rest);color:var(--restText);border:1px solid #86efac} .dd .turnbox{background:var(--dd);color:var(--ddText);border:1px solid #ffadbc} .vac .turnbox{background:var(--vac);color:#0c4a6e;border:1px solid #a9d9ff}.rest .turnnum,.vac .turnnum,.dd .turnnum{font-size:14px} .manual{outline:2px dashed #e8b800} .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;background:var(--work);color:var(--renfe);font-weight:900;font-size:12px} .badge.dd{background:var(--dd);color:var(--ddText)} .legend{display:flex;justify-content:center;gap:16px;padding:12px;font-size:12px;color:var(--muted)} .sq{width:24px;height:12px;border-radius:5px;display:inline-block;vertical-align:middle;margin-right:5px} .sq.work{background:var(--work);border:1px solid #c99bda} .sq.rest{background:var(--rest);border:1px solid #a9e7bc} .sq.dd{background:var(--dd);border:1px solid #ffadbc}.sq.vac{background:var(--vac);border:1px solid #a9d9ff}
.detail{display:grid;grid-template-columns:1.1fr 1fr 1fr;gap:14px} .bigtime{font-size:26px;font-weight:950;color:var(--renfe)} .kv{display:grid;grid-template-columns:120px 1fr;gap:6px;margin:6px 0;font-size:14px} .timeline{border-left:3px solid var(--renfe);padding-left:14px;margin-left:8px} .event{position:relative;margin:12px 0} .event:before{content:"";position:absolute;left:-22px;top:3px;width:13px;height:13px;border-radius:50%;background:var(--renfe)} .time{font-weight:950;color:var(--renfe)} input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:12px;background:var(--card);color:var(--text)} label{display:block;font-size:12px;color:var(--muted);margin:8px 0 4px} .statrow{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding:12px 4px} .statrow:last-child{border-bottom:0} .statrow b{font-size:20px} .notice{background:linear-gradient(135deg,#fbebff,#fff);border:1px solid #edc8f2;color:#5a1262} body.dark .notice{background:#211426}
.tabs{display:flex;gap:6px;background:#f3eef5;border:1px solid var(--line);border-radius:12px;padding:3px} body.dark .tabs{background:#211426} .tabs button{border:0;background:transparent;padding:9px 12px;border-radius:9px;font-weight:900;color:var(--muted)} .tabs button.active{background:var(--renfe);color:white}
.bottomnav{display:none} .installbar{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(135deg,var(--renfe),#7b137b);color:white;z-index:30;padding:10px 18px;display:flex;justify-content:space-between;align-items:center;font-size:13px} .installbar button{border:1px solid rgba(255,255,255,.45);background:rgba(255,255,255,.12);color:white;border-radius:10px;padding:8px 12px;font-weight:900}
@media(max-width:1050px){.layout{grid-template-columns:1fr} aside,.rightcol{display:none} .detail{grid-template-columns:1fr} .top{height:auto;padding:12px} .renfe{font-size:28px} .calendar{border-radius:12px} .day{min-height:82px;padding:6px} .turnbox{font-size:12px;padding:6px 4px} .bottomnav{display:grid;position:fixed;left:0;right:0;bottom:0;background:var(--card);border-top:1px solid var(--line);grid-template-columns:repeat(5,1fr);z-index:40} .bottomnav button{border:0;background:transparent;color:var(--muted);padding:8px 2px;font-weight:800;font-size:11px} .bottomnav button.active{color:var(--renfe)} .installbar{display:none} body{padding-bottom:70px}}
@media(max-width:650px){.layout{padding:8px} .day{min-height:70px} .day .extra{display:none} .monthtitle{font-size:22px} .topspacer,.top .primary{display:none}}

/* v0.5 ajustes visuales */
.rest .turnnum{color:var(--restText);font-size:18px;font-weight:1000}
.dd .turnbox{font-size:12px}
.vac .turnbox{font-weight:1000}
</style></head><body>
<div class="app"><header><div class="top"><div class="brand"><div class="renfe">renfe</div><div><h1>App Turnos Pro <span class="version">v0.8</span></h1><div class="small muted">Calendario visual · importación privada de cuadro anual y marco</div></div></div><div class="topspacer"></div><button class="btn primary" onclick="importPrivateData()">📦 Importar paquete privado</button><button class="btn" onclick="importAnnual()">📅 Cuadro anual</button><button class="btn" onclick="importMarco()">🚄 Marco mensual</button><button class="btn" onclick="lockApp()">🔒 Bloquear</button><button class="iconbtn" onclick="toggleTheme()">⚙️</button></div></header>
<div class="layout"><aside><div class="sidecard" id="sideNav"></div><div class="sidefoot" id="nextBox"></div></aside><main><section id="home" class="view"></section><section id="calendar" class="view hidden"></section><section id="turns" class="view hidden"></section><section id="stats" class="view hidden"></section><section id="changes" class="view hidden"></section><section id="settings" class="view hidden"></section></main><div class="rightcol"><div class="card" id="statsBox"></div><div class="card" id="upcomingBox"></div><div class="card notice" id="alertsBox"></div></div></div></div>
<input type="file" id="privateDataFile" accept="application/json,.json" style="display:none" onchange="handlePrivateDataFile(event)"><input type="file" id="annualFile" accept="application/json,.json,application/pdf,.pdf" style="display:none" onchange="handleAnnualFile(event)"><input type="file" id="marcoFile" accept="application/json,.json,application/pdf,.pdf" style="display:none" onchange="handleMarcoFile(event)"><nav class="bottomnav" id="bottomNav"></nav><div class="installbar"><span>Los datos de turnos personales se guardan localmente en este dispositivo.</span><button onclick="installApp()">⬇ Instalar aplicación</button></div>
<script>
let CALENDAR=JSON.parse(localStorage.getItem('appTurnosCalendar')||'[]');
let BLOCKS=JSON.parse(localStorage.getItem('appTurnosBlocks')||'[]');
let EVENTS=JSON.parse(localStorage.getItem('appTurnosEvents')||'[]');
let STATIONS=JSON.parse(localStorage.getItem('appTurnosStations')||'[]');
let SERVICES=JSON.parse(localStorage.getItem('appTurnosServices')||'[]');
const DAYMAP={0:'D',1:'L',2:'M',3:'X',4:'J',5:'V',6:'S'};

let state=JSON.parse(localStorage.appTurnosState||'{"changes":{},"notes":{},"theme":"auto","accent":"#8a1a86","lastView":"calendar","y":2026,"m":1}');
if(!Number.isInteger(state.y)||!Number.isInteger(state.m)){state.y=2026;state.m=1;save();}
let current=new Date(state.y,state.m,1);let selected=null;let deferredPrompt=null;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferredPrompt=e});
const VIEWS=[['calendar','📅','Calendario'],['turns','📋','Turnos y tareas'],['stats','📊','Estadísticas'],['changes','🔁','Cambiar turnos'],['settings','⚙️','Ajustes']];
function save(){localStorage.appTurnosState=JSON.stringify(state)}
function show(id){document.querySelectorAll('.view').forEach(v=>v.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');state.lastView=id;save();renderNav();renderAll(false)}
function renderNav(){let html=VIEWS.map(([id,ic,tx])=>`<div class="navitem ${state.lastView===id?'active':''}" onclick="show('${id}')"><span>${ic}</span><span>${tx}</span></div>`).join('');document.getElementById('sideNav').innerHTML=html;document.getElementById('bottomNav').innerHTML=VIEWS.map(([id,ic,tx])=>`<button class="${state.lastView===id?'active':''}" onclick="show('${id}')">${ic}<br>${tx.split(' ')[0]}</button>`).join('')}
function fmt(d){return d.toISOString().slice(0,10)} function byDate(ds){return CALENDAR.find(x=>x.fecha===ds)}
function ddLetter(ds){return DAYMAP[new Date(ds+'T12:00:00').getDay()]}
function effective(day){let c=state.changes[day.fecha];return c?{...day,clave_original:day.clave_turno,clave_turno:c.turno,tipo_dia:c.tipo||'Trabajo',manual:true,motivo:c.motivo||''}:day}
function isDD(day){return String(day.clave_turno).toUpperCase()==='DD'||String(day.tipo_dia||'').toLowerCase().includes('detra')}
function typeClass(day){if(day.manual)return 'manual work'; if(isDD(day))return 'dd';let t=(day.tipo_dia||'').toLowerCase(); if(t.includes('desc'))return 'rest'; if(t.includes('vac')||day.clave_turno==='VB')return 'vac'; return 'work'}
function blocksFor(day){let dd=ddLetter(day.fecha);return BLOCKS.filter(b=>String(b.turno)===String(day.clave_turno)&&String(b.dias||'').includes(dd))}
function bestBlock(day){return blocksFor(day)[0]||BLOCKS.find(b=>String(b.turno)===String(day.clave_turno))}
function eventsFor(day,block){let dd=ddLetter(day.fecha);return EVENTS.filter(e=>String(e.turno)===String(day.clave_turno)&&(String(e.dias_aplicacion||'').includes(dd)||String(e.bloque)===String(block?.bloque))).sort((a,b)=>(+a.orden||0)-(+b.orden||0))}
function station(code){let s=STATIONS.find(x=>x.codigo===code);return s?`${code} · ${s.estacion}`:code||'—'}
function service(code){let s=SERVICES.find(x=>x.codigo===code);return s?s.descripcion:code||'—'}

function extractTime(txt){let m=String(txt||'').match(/(\d{1,2}:\d{2})/);return m?m[1]:''}
function classifyLine(txt){txt=String(txt||'');if(txt.includes('RVA'))return 'Reserva';if(txt.includes('SC'))return 'Servicios complementarios';if(txt.includes('PS'))return 'PS / pasos';if(txt.includes('AC'))return 'Actividad complementaria';if(/\b\d{5}\b/.test(txt))return 'Tren / movimiento';if(txt.includes('D E S C A N S O'))return 'Descanso compensado';return 'Actividad'}
function timeOnly(txt){let m=String(txt||'').match(/\d{1,2}:\d{2}/);return m?m[0]:'—'}
function placeOnly(txt){return String(txt||'').replace(/\d{1,2}:\d{2}/g,'').trim()||'—'}
function dayTitle(ds){return new Date(ds+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function monthLabel(d){return d.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}
function renderCalendar(){if(!CALENDAR.length){document.getElementById('calendar').innerHTML=noDataHtml();return}let {y,m}=state;let first=new Date(y,m,1);let start=(first.getDay()+6)%7;let days=new Date(y,m+1,0).getDate();let html=`<div class="calhead"><button class="btn" onclick="prevMonth()">‹</button><div class="monthtitle">${first.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</div><button class="btn" onclick="nextMonth()">›</button><button class="btn ghost" onclick="goToday()">Hoy</button></div><div class="calendar"><div class="dowgrid">${['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'].map(x=>`<div class="dow">${x}</div>`).join('')}</div><div class="grid">`;for(let i=0;i<start;i++)html+='<div class="day"></div>';for(let d=1;d<=days;d++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let raw=byDate(ds);if(!raw){html+=`<div class="day"><div class="n">${d}</div></div>`;continue}let e=effective(raw);let b=bestBlock(e);let cls=typeClass(e);let isRest=cls.includes('rest');let isVac=cls.includes('vac');let top='',bottom='',turnLabel=e.clave_turno;if(isDD(e)){top='DD';bottom='Detraíble';}else if(isVac){top='Vacaciones';bottom='';turnLabel='';}else if(isRest){top='Descanso';bottom='';turnLabel='';}else{top=timeOnly(b?.presentacion)||'Pend.';bottom=timeOnly(b?.finalizacion)||'';}html+=`<div class="day ${cls} ${selected===ds?'selected':''}" onclick="selectDay('${ds}')"><div class="n">${d}</div>${turnLabel?`<div class="turnnum">${turnLabel}</div>`:''}<div class="turnbox"><div>${top}</div>${bottom?`<div>${bottom}</div>`:''}</div>${e.manual?'<div class="small">✎ mod.</div>':''}</div>`}html+=`</div><div class="legend"><span><i class="sq work"></i>Trabajo</span><span><i class="sq rest"></i>Descanso</span><span><i class="sq dd"></i>DD detraíble</span><span><i class="sq vac"></i>Vacaciones</span></div></div>`;if(selected&&byDate(selected))html+=renderDetail(byDate(selected));document.getElementById('calendar').innerHTML=html}
function renderDetail(day){day=effective(day);let b=bestBlock(day);let ev=eventsFor(day,b);let start=timeOnly(b?.presentacion),end=timeOnly(b?.finalizacion);let cls=isDD(day)?'dd':'';let dayCls=typeClass(day);let isRest=dayCls.includes('rest');let isVac=dayCls.includes('vac');let title=isDD(day)?'Detraíble':(isVac?'Vacaciones':(isRest?'Descanso':'Turno '+day.clave_turno));let big=isDD(day)?'Detraíble':(isVac?'Vacaciones':(isRest?'D · Descanso':`${start||'—'} - ${end||'—'}`));let lineas=(b?.lineas||[]).filter(Boolean);let timeline='';if(ev.length){timeline=ev.map(e=>`<div class="event"><div class="time">${e.hora}</div><div><b>${e.accion}</b> ${e.tren?`· Tren ${e.tren}`:''}</div><div class="muted small">${station(e.lugar)} ${e.nota?`· ${e.nota}`:''}</div></div>`).join('')}else if(lineas.length){timeline=lineas.map((txt,i)=>`<div class="event"><div class="time">${extractTime(txt)||'—'}</div><div><b>${classifyLine(txt)}</b></div><div class="muted small">${txt}</div></div>`).join('')}else{timeline=`<div class="event"><div class="time">${start||'—'}</div><div><b>${b?.tipo||day.tipo_dia}</b></div><div class="muted small">${b?.detalle||'Sin eventos cargados todavía'}</div></div>`}return `<div class="card"><div class="row between"><div><span class="badge ${cls}">${title}</span><h2>${dayTitle(day.fecha)}</h2><div class="bigtime">${big}</div><div class="muted">${b?.jornada?'Duración '+b.jornada:'Duración pendiente'}</div></div><button class="btn primary" onclick="show('changes')">Editar turno</button></div><div class="detail"><div><h3>Resumen</h3><div class="kv"><span class="muted">Presentación</span><b>${b?.presentacion||'—'}</b></div><div class="kv"><span class="muted">Finalización</span><b>${b?.finalizacion||'—'}</b></div><div class="kv"><span class="muted">Tipo</span><b>${b?.tipo||day.tipo_dia}</b></div><div class="kv"><span class="muted">Clave original</span><b>${day.clave_original||day.clave_turno}</b></div><p class="small muted">${b?.detalle||'Pendiente de desarrollo detallado para esta clave.'}</p>${b?.fuente==='auto-revisar'?'<p class="small" style="color:#9a6500">⚠ Desarrollo automático: conviene revisar contra el gráfico.</p>':''}</div><div><h3>Tareas / eventos</h3><div class="timeline">${timeline}</div></div><div><h3>Nota privada</h3><textarea rows="5" placeholder="Añade notas privadas de este día..." oninput="state.notes['${day.fecha}']=this.value;save()">${state.notes[day.fecha]||''}</textarea><p class="small muted">Se guarda solo en este dispositivo.</p></div></div></div>`}
function renderHome(){if(!CALENDAR.length){document.getElementById('home').innerHTML=noDataHtml();return}let today=byDate(fmt(new Date()))||CALENDAR.find(d=>d.tipo_dia==='Trabajo')||CALENDAR[0];selected=selected||today.fecha;document.getElementById('home').innerHTML=`<div class="card notice"><div class="row between"><div><h2>¿Qué hago hoy?</h2><p class="muted">Vista rápida del turno, presentación y finalización.</p></div><button class="btn primary" onclick="show('calendar')">Abrir calendario</button></div></div>${renderDetail(today)}`}
function nextWork(from=new Date()){let base=fmt(from);return CALENDAR.map(effective).find(d=>d.fecha>=base&&!typeClass(d).includes('rest')&&!isDD(d))||CALENDAR.map(effective).find(d=>!typeClass(d).includes('rest')&&!isDD(d))}
function renderSideBoxes(){if(!CALENDAR.length){document.getElementById('nextBox').innerHTML='<div class="small muted">Sin datos privados cargados</div>';document.getElementById('statsBox').innerHTML='<h3>Estadísticas</h3><p class="muted">Importa tus datos.</p>';document.getElementById('upcomingBox').innerHTML='<h3>Próximos turnos</h3><p class="muted">Importa tus datos.</p>';document.getElementById('alertsBox').innerHTML='<h3>🔔 Avisos</h3><p class="muted">Sin datos.</p>';return}let n=nextWork();let b=n?bestBlock(n):null;document.getElementById('nextBox').innerHTML=`<div class="small muted">Próxima presentación</div><h3>${n?new Date(n.fecha+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}):'—'}</h3><div class="bigtime">${timeOnly(b?.presentacion)}</div><div class="small muted">${b?.presentacion?placeOnly(b.presentacion):''}</div>`;document.getElementById('statsBox').innerHTML=statsHtml();document.getElementById('upcomingBox').innerHTML=upcomingHtml();document.getElementById('alertsBox').innerHTML=`<h3>🔔 Avisos</h3><p><b>Presentación ${timeOnly(b?.presentacion)}</b><br><span class="muted small">${n?dayTitle(n.fecha):'Sin próximos turnos'}</span></p>`}
function stats(){let c={trabajo:0,descanso:0,dd:0,vac:0,mod:Object.keys(state.changes).length,min:0};CALENDAR.map(effective).forEach(d=>{let cl=typeClass(d);if(isDD(d))c.dd++;else if(cl.includes('rest'))c.descanso++;else if(cl.includes('vac'))c.vac++;else {c.trabajo++;let b=bestBlock(d);let j=String(b?.jornada||'');let m=j.match(/(\d{1,2}):(\d{2})/);if(m)c.min+=+m[1]*60+ +m[2];}});return c}
function hhmm(min){return `${Math.floor(min/60)}:${String(min%60).padStart(2,'0')}`}
function statsHtml(){let c=stats();return `<h3>Estadísticas</h3><div class="statrow"><span>💼 Días trabajados</span><b>${c.trabajo}</b></div><div class="statrow"><span>🕒 Horas aprox.</span><b>${hhmm(c.min)}</b></div><div class="statrow"><span>⚠️ DD detraíbles</span><b style="color:var(--ddText)">${c.dd}</b></div><div class="statrow"><span>🛏️ Descansos</span><b>${c.descanso}</b></div><div class="statrow"><span>✎ Modificados</span><b>${c.mod}</b></div>`}
function upcomingHtml(){let base=fmt(new Date());let rows=CALENDAR.map(effective).filter(d=>d.fecha>=base&&!typeClass(d).includes('rest')&&!isDD(d)).slice(0,4);if(!rows.length)rows=CALENDAR.map(effective).filter(d=>!typeClass(d).includes('rest')&&!isDD(d)).slice(0,4);return `<h3>Próximos turnos</h3>${rows.map(d=>{let b=bestBlock(d);return `<div class="statrow"><span>${new Date(d.fecha+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'})}<br><span class="small muted">Turno ${d.clave_turno}</span></span><b>${timeOnly(b?.presentacion)} - ${timeOnly(b?.finalizacion)}</b></div>`}).join('')}`}
function renderTurns(){if(!BLOCKS.length){document.getElementById('turns').innerHTML=noDataHtml();return}let keys=[...new Set(BLOCKS.map(b=>b.turno))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));document.getElementById('turns').innerHTML=`<div class="card"><h2>Turnos y tareas</h2><p class="muted">Desarrollo leído del marco. Pulsa una clave para ver bloques y eventos.</p><input id="turnSearch" placeholder="Buscar clave, estación, tren..." oninput="renderTurnList(this.value)"><div id="turnList"></div></div>`;renderTurnList('')}
function renderTurnList(q=''){q=q.toLowerCase();let keys=[...new Set(BLOCKS.map(b=>b.turno))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));let html='';keys.filter(k=>!q||String(k).toLowerCase().includes(q)||BLOCKS.filter(b=>b.turno===k).some(b=>JSON.stringify(b).toLowerCase().includes(q))||EVENTS.filter(e=>e.turno===k).some(e=>JSON.stringify(e).toLowerCase().includes(q))).slice(0,100).forEach(k=>{let blocks=BLOCKS.filter(b=>b.turno===k);html+=`<details class="card"><summary><b>Turno ${k}</b> · ${blocks.length} bloque(s)</summary>${blocks.map(b=>`<div style="border-top:1px solid var(--line);padding:10px 0"><span class="badge">${b.dias}</span> <b>${b.tipo}</b>${b.fuente==='auto-revisar'?'<span class="small" style="color:#9a6500"> · auto</span>':''}<div>${b.presentacion||'—'} → ${b.finalizacion||'—'} · ${b.jornada||'—'}</div><p class="small muted">${b.detalle||''}</p>${(b.lineas||[]).length?`<ul class="small muted">${b.lineas.slice(0,8).map(x=>`<li>${x}</li>`).join('')}</ul>`:''}</div>`).join('')}</details>`});document.getElementById('turnList').innerHTML=html||'<p class="muted">Sin resultados.</p>'}
function renderStats(){if(!CALENDAR.length){document.getElementById('stats').innerHTML=noDataHtml();return}document.getElementById('stats').innerHTML=`<div class="card">${statsHtml()}</div>`}
function renderChanges(){if(!CALENDAR.length){document.getElementById('changes').innerHTML=noDataHtml();return}let ds=selected||CALENDAR[0].fecha;let day=effective(byDate(ds));document.getElementById('changes').innerHTML=`<div class="card"><h2>Cambiar turno</h2><label>Fecha</label><input type="date" id="chgDate" value="${ds}" onchange="selected=this.value;renderChanges()"><label>Nueva clave</label><input id="chgTurn" value="${day.clave_turno}"><label>Motivo</label><input id="chgReason" placeholder="Cambio, licencia, ajuste manual..." value="${day.motivo||''}"><div class="row" style="margin-top:10px"><button class="btn primary" onclick="applyChange()">Guardar cambio</button><button class="btn ghost" onclick="resetChange()">Restaurar original</button></div></div><div class="card"><h3>Cambios guardados</h3>${Object.entries(state.changes).length?Object.entries(state.changes).map(([d,c])=>`<p><b>${dayTitle(d)}</b>: ${c.original} → <b>${c.turno}</b><br><span class="muted small">${c.motivo||''}</span></p>`).join(''):'<p class="muted">No hay cambios manuales.</p>'}</div>`}
function applyChange(){let ds=document.getElementById('chgDate').value;let original=byDate(ds);if(!original)return alert('Fecha fuera del cuadro cargado');state.changes[ds]={turno:document.getElementById('chgTurn').value.trim(),motivo:document.getElementById('chgReason').value.trim(),tipo:'Trabajo',original:original.clave_turno};selected=ds;save();renderAll()}
function resetChange(){let ds=document.getElementById('chgDate').value;delete state.changes[ds];save();renderAll()}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="card"><h2>Ajustes e importación privada</h2><p class="muted">La web pública es solo la aplicación. Tus datos se importan y se guardan en este dispositivo.</p><div class="row"><button class="btn primary" onclick="importPrivateData()">📦 Importar paquete completo</button><button class="btn" onclick="importAnnual()">📅 Importar cuadro anual</button><button class="btn" onclick="importMarco()">🚄 Importar Marco mensual</button><button class="btn" onclick="lockApp()">🔒 Bloquear app</button><button class="btn primary" onclick="installApp()">Instalar aplicación</button><button class="btn" onclick="toggleTheme()">Modo claro/oscuro</button><button class="btn ghost" onclick="exportData()">Exportar copia local</button><button class="btn ghost" onclick="clearPrivateData()">Borrar datos privados locales</button></div><hr style="border:0;border-top:1px solid var(--line);margin:16px 0"><h3>Flujo recomendado</h3><ol class="muted"><li>Cuadro anual: importa un JSON de calendario una vez al año.</li><li>Marco mensual: cuando cambie el marco, importa el nuevo JSON del marco.</li><li>Si tienes PDF, pásamelo por ChatGPT y te lo convierto a JSON para la app.</li></ol><p class="small muted">Importar PDF directamente queda reservado como referencia: la app todavía no interpreta PDFs complejos de gráficos de turnos con fiabilidad.</p></div>`}
function toggleTheme(){document.body.classList.toggle('dark');state.theme=document.body.classList.contains('dark')?'dark':'light';save()}
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}else alert('En Chrome: menú ⋮ → Añadir a pantalla de inicio.')}
function exportData(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='appturnos-copia.json';a.click()}
function refreshData(){alert('Próximo paso: importador desde archivo privado. De momento los datos cargados están integrados en esta versión.')}


function importPrivateData(){document.getElementById('privateDataFile').click()}
function handlePrivateDataFile(ev){let f=ev.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{let d=JSON.parse(r.result);CALENDAR=d.calendar||d.CALENDAR||[];BLOCKS=d.blocks||d.BLOCKS||[];EVENTS=d.events||d.EVENTS||[];STATIONS=d.stations||d.STATIONS||[];SERVICES=d.services||d.SERVICES||[];localStorage.setItem('appTurnosCalendar',JSON.stringify(CALENDAR));localStorage.setItem('appTurnosBlocks',JSON.stringify(BLOCKS));localStorage.setItem('appTurnosEvents',JSON.stringify(EVENTS));localStorage.setItem('appTurnosStations',JSON.stringify(STATIONS));localStorage.setItem('appTurnosServices',JSON.stringify(SERVICES));alert('Datos privados importados en este dispositivo. No se han subido a GitHub.');selected=null;renderAll()}catch(e){alert('No he podido leer el JSON: '+e.message)}};r.readAsText(f)}

function importAnnual(){document.getElementById('annualFile').click()}
function importMarco(){document.getElementById('marcoFile').click()}
function clearPrivateData(){
  if(!confirm('¿Borrar calendario, marco y servicios guardados solo en este dispositivo?')) return;
  ['appTurnosCalendar','appTurnosBlocks','appTurnosEvents','appTurnosStations','appTurnosServices'].forEach(k=>localStorage.removeItem(k));
  CALENDAR=[];BLOCKS=[];EVENTS=[];STATIONS=[];SERVICES=[];selected=null;renderAll();alert('Datos privados locales borrados.');
}
function parseJsonFile(file,cb){
  let r=new FileReader();
  r.onload=()=>{try{cb(JSON.parse(r.result))}catch(e){alert('No he podido leer el JSON: '+e.message)}};
  r.readAsText(file);
}
function isPdf(file){return file && (file.type==='application/pdf' || file.name.toLowerCase().endsWith('.pdf'))}
function handleAnnualFile(ev){
  let f=ev.target.files[0]; if(!f)return;
  if(isPdf(f)){ alert('PDF recibido, pero esta versión no interpreta PDFs complejos directamente. Flujo recomendado: pásame el PDF por ChatGPT y te devuelvo un JSON de cuadro anual para importar aquí.'); return; }
  parseJsonFile(f,d=>{
    let calendar=d.calendar||d.CALENDAR||d.calendario||[];
    if(!Array.isArray(calendar)||!calendar.length) return alert('Ese JSON no contiene un calendario válido. Debe tener una clave "calendar".');
    CALENDAR=calendar; localStorage.setItem('appTurnosCalendar',JSON.stringify(CALENDAR));
    let first=CALENDAR[0]?.fecha; if(first){state.y=+first.slice(0,4); state.m=+first.slice(5,7)-1;}
    save(); selected=null; renderAll(); alert('Cuadro anual importado solo en este dispositivo.');
  })
}
function handleMarcoFile(ev){
  let f=ev.target.files[0]; if(!f)return;
  if(isPdf(f)){ alert('PDF recibido, pero esta versión no interpreta gráficos de Marco directamente. Flujo recomendado: pásame el PDF por ChatGPT y te devuelvo un JSON de Marco mensual para importar aquí.'); return; }
  parseJsonFile(f,d=>{
    let blocks=d.blocks||d.BLOCKS||d.bloques||[];
    let events=d.events||d.EVENTS||d.eventos||[];
    let stations=d.stations||d.STATIONS||d.estaciones||[];
    let services=d.services||d.SERVICES||d.servicios||[];
    if(!Array.isArray(blocks)||!blocks.length) return alert('Ese JSON no contiene un Marco válido. Debe tener una clave "blocks".');
    BLOCKS=blocks; EVENTS=events; STATIONS=stations; SERVICES=services;
    localStorage.setItem('appTurnosBlocks',JSON.stringify(BLOCKS));
    localStorage.setItem('appTurnosEvents',JSON.stringify(EVENTS));
    localStorage.setItem('appTurnosStations',JSON.stringify(STATIONS));
    localStorage.setItem('appTurnosServices',JSON.stringify(SERVICES));
    renderAll(); alert('Marco importado/actualizado solo en este dispositivo.');
  })
}

function noDataHtml(){return `<div class="card notice"><h2>Datos privados no cargados</h2><p>Esta versión pública no contiene tu planning ni el desarrollo de turnos. Importa un paquete completo o importa por separado el cuadro anual y el Marco mensual. Se guardará solo en este navegador.</p><button class="btn primary" onclick="importPrivateData()">📦 Importar paquete privado</button></div>`}
function lockApp(){localStorage.setItem('appTurnosLocked','1');location.reload()}
function unlockApp(){let pin=document.getElementById('pinInput').value;if(!localStorage.getItem('appTurnosPin')){if(pin.length<6)return alert('Pon una contraseña/PIN de al menos 6 caracteres.');localStorage.setItem('appTurnosPin',pin);localStorage.setItem('appTurnosLocked','0');location.reload();return}if(pin===localStorage.getItem('appTurnosPin')){localStorage.setItem('appTurnosLocked','0');location.reload()}else alert('Contraseña incorrecta')}
function lockScreen(){document.body.innerHTML=`<div class="app"><header><div class="top"><div class="brand"><div class="renfe">renfe</div><div><h1>App Turnos Pro <span class="version">v0.8</span></h1><div class="small muted">Bloqueo local de pantalla</div></div></div></div></header><main><section class="view"><div class="card" style="max-width:520px;margin:40px auto"><h2>🔒 App bloqueada</h2><p class="muted">Este bloqueo protege la visualización en este dispositivo. Los datos privados no están incluidos en el código público.</p><input id="pinInput" type="password" placeholder="Contraseña / PIN"><button class="btn primary" onclick="unlockApp()" style="margin-top:10px;width:100%">Entrar</button><p class="small muted">Primera vez: escribe una contraseña de al menos 6 caracteres para crearla.</p></div></section></main></div>`}

function setMonth(y,m){state.y=y;state.m=m;save();renderCalendar();renderSideBoxes();renderStats()}
function prevMonth(){let y=state.y,m=state.m-1;if(m<0){m=11;y--}setMonth(y,m)}
function nextMonth(){let y=state.y,m=state.m+1;if(m>11){m=0;y++}setMonth(y,m)}
function goToday(){let today=fmt(new Date());let d=byDate(today)||CALENDAR[0];state.y=+d.fecha.slice(0,4);state.m=+d.fecha.slice(5,7)-1;selected=d.fecha;save();renderAll(false)}

function renderAll(updateHome=true){if(updateHome)renderHome();renderCalendar();renderTurns();renderStats();renderChanges();renderSettings();renderSideBoxes();renderNav()}
if(state.theme==='dark')document.body.classList.add('dark');show(state.lastView||'calendar');
</script></body></html>

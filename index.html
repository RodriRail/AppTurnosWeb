function blocksFor(day){let dd=DAYMAP[new Date(day.fecha+'T12:00:00').getDay()];return BLOCKS.filter(b=>String(b.turno)===String(day.clave_turno)&&String(b.dias||'').includes(dd))}
function eventsFor(day,block){let dd=DAYMAP[new Date(day.fecha+'T12:00:00').getDay()]; return EVENTS.filter(e=>String(e.turno)===String(day.clave_turno)&&(String(e.dias_aplicacion||'').includes(dd)||String(e.bloque)===String(block?.bloque))).sort((a,b)=>(+a.orden||0)-(+b.orden||0))}
function station(code){let s=STATIONS.find(x=>x.codigo===code);return s?`${code} · ${s.estacion}`:code}
function dayTitle(ds){let d=new Date(ds+'T12:00:00');return d.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function renderDayCard(day,home=false){day=effective(day); let blocks=blocksFor(day); let b=blocks[0]; let ev=eventsFor(day,b); let note=state.notes[day.fecha]||''; return `<div class="card"><div class="row between"><div><div class="muted small">${dayTitle(day.fecha)}</div><h2 style="margin:4px 0">Turno ${day.clave_turno}</h2></div><span class="pill ${day.manual?'warn':''}">${day.manual?'Modificado':'Original'}</span></div>${day.manual?`<p class="small">Original: <b>${day.clave_original}</b> · Motivo: ${day.motivo||'—'}</p>`:''}<div class="tabs"><button class="active" onclick="tab('res')">Resumida</button><button onclick="tab('pro')">Profesional</button><button onclick="tab('edit')">Editar</button></div><div id="res" class="tab"><p><b>Tipo:</b> ${b?.tipo||day.tipo_dia}</p><p><b>Presentación:</b> ${b?.presentacion||'—'}</p><p><b>Finalización:</b> ${b?.finalizacion||'—'}</p><p><b>Jornada:</b> ${b?.jornada||'—'}</p><p><b>Detalle:</b> ${b?.detalle||'Sin detalle cargado todavía para este bloque.'}</p><textarea placeholder="Nota del día..." oninput="state.notes['${day.fecha}']=this.value;save()">${note}</textarea></div><div id="pro" class="tab hidden"><div class="timeline">${ev.length?ev.map(e=>`<div class="event"><div class="time">${e.hora}</div><div><b>${e.accion}</b> ${e.tren?`· Tren ${e.tren}`:''}</div><div class="muted">${station(e.lugar)}</div></div>`).join(''):`<div class="event"><div class="time">${b?.presentacion||'—'}</div><div><b>${b?.tipo||'Servicio'}</b></div><div class="muted">${b?.detalle||'Pendiente de eventos detallados'}</div></div>`}</div></div><div id="edit" class="tab hidden"><label>Cambiar turno de este día</label><input id="changeTurn" value="${day.clave_turno}"><label>Motivo</label><input id="changeReason" placeholder="Cambio, licencia, asunto propio..." value="${day.motivo||''}"><div class="row"><button class="btn" onclick="applyChange('${day.fecha}')">Guardar cambio</button><button class="btn secondary" onclick="resetChange('${day.fecha}')">Restaurar original</button></div></div></div>`}
function tab(id){document.querySelectorAll('.tab').forEach(t=>t.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active')}
function renderHome(){let today=byDate(fmt(new Date()))||CALENDAR[0]; document.getElementById('home').innerHTML=`<div class="card"><div class="row between"><div><h2>¿Qué hago hoy?</h2><p class="muted">Si hoy no está en el cuadro 2026, muestro el primer día del cuadro para pruebas.</p></div><button class="btn" onclick="show('calendar')">Ver calendario</button></div></div>${renderDayCard(today,true)}`}
function renderCalendar(){let y=current.getFullYear(),m=current.getMonth(); let first=new Date(y,m,1); let start=(first.getDay()+6)%7; let days=new Date(y,m+1,0).getDate(); let html=`<div class="card"><div class="row between"><button class="btn secondary" onclick="current.setMonth(current.getMonth()-1);renderCalendar()">←</button><h2>${first.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}</h2><button class="btn secondary" onclick="current.setMonth(current.getMonth()+1);renderCalendar()">→</button></div><div class="grid">${['L','M','X','J','V','S','D'].map(x=>`<div class="dow">${x}</div>`).join('')}`; for(let i=0;i<start;i++)html+='<div></div>'; for(let d=1;d<=days;d++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; let day=byDate(ds); if(!day){html+=`<div class="day"><div class="n">${d}</div></div>`;continue} let e=effective(day); html+=`<div class="day ${typeClass(e)} ${selected===ds?'selected':''}" onclick="selected='${ds}';renderCalendar()"><div class="n">${d}</div><div class="turn">${e.clave_turno}</div>${e.manual?'<div class="small">mod.</div>':''}</div>`} html+='</div></div>'; if(selected&&byDate(selected))html+=renderDayCard(byDate(selected)); document.getElementById('calendar').innerHTML=html}
function applyChange(ds){let original=byDate(ds);let turno=document.getElementById('changeTurn').value.trim();let motivo=document.getElementById('changeReason').value.trim();state.changes[ds]={turno,motivo,tipo:'Trabajo',original:original.clave_turno};save();renderAll()}
function resetChange(ds){delete state.changes[ds];save();renderAll()}
function renderStats(){let counts={Trabajo:0,Descanso:0,Vacaciones:0,Modificados:Object.keys(state.changes).length,Reservas:0};CALENDAR.forEach(d=>{let e=effective(d);let t=typeClass(e);if(t==='rest')counts.Descanso++;else if(t==='vac')counts.Vacaciones++;else counts.Trabajo++;blocksFor(e).forEach(b=>{if(String(b.tipo).toLowerCase().includes('reserva'))counts.Reservas++})});document.getElementById('stats').innerHTML=`<div class="card"><h2>Estadísticas 2026</h2><div class="statgrid">${Object.entries(counts).map(([k,v])=>`<div class="stat"><div class="muted">${k}</div><b>${v}</b></div>`).join('')}</div></div>`}
function renderChanges(){let rows=Object.entries(state.changes);document.getElementById('changes').innerHTML=`<div class="card"><h2>Cambios manuales</h2>${rows.length?rows.map(([ds,c])=>`<p><b>${dayTitle(ds)}</b><br>Original ${c.original||byDate(ds)?.clave_turno} → <b>${c.turno}</b><br><span class="muted">${c.motivo||'Sin motivo'}</span></p>`).join(''):'<p class="muted">Todavía no hay cambios manuales.</p>'}</div>`}
function renderSettings(){document.getElementById('settings').innerHTML=`<div class="card"><h2>Ajustes</h2><div class="row"><button class="btn" onclick="document.body.classList.toggle('dark')">Modo oscuro</button><button class="btn secondary" onclick="localStorage.removeItem('appTurnosState');location.reload()">Borrar datos locales</button></div><p class="muted small">Los cambios y notas se guardan en esta tablet mediante localStorage. Más adelante añadiremos copia de seguridad.</p></div>`}
function renderAll(){renderHome();renderCalendar();renderStats();renderChanges();renderSettings()}
show('home');
</script></body></html>

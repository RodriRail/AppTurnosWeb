function fmt(d){return d.toISOString().slice(0,10)} function byDate(ds){return CALENDAR.find(x=>x.fecha===ds)}
function ddLetter(ds){return DAYMAP[new Date(ds+'T12:00:00').getDay()]}
function effective(day){let c=state.changes[day.fecha];return c?{...day,clave_original:day.clave_turno,clave_turno:c.turno,tipo_dia:c.tipo||'Trabajo',manual:true,motivo:c.motivo||''}:day}
function isDD(day){return String(day.clave_turno).toUpperCase()==='DD'||String(day.tipo_dia||'').toLowerCase().includes('detra')}
function typeClass(day){if(day.manual)return 'manual work'; if(isDD(day))return 'dd';let t=(day.tipo_dia||'').toLowerCase(); if(t.includes('desc'))return 'rest'; if(t.includes('vac')||day.clave_turno==='VB')return 'vac'; return 'work'}
function blocksFor(day){let dd=ddLetter(day.fecha);return BLOCKS.filter(b=>String(b.turno)===String(day.clave_turno)&&String(b.dias||'').includes(dd))}
function bestBlock(day){return blocksFor(day)[0]||BLOCKS.find(b=>String(b.turno)===String(day.clave_turno))}
function eventsFor(day,block){let dd=ddLetter(day.fecha);return EVENTS.filter(e=>String(e.turno)===String(day.clave_turno)&&(String(e.dias_aplicacion||'').includes(dd)||String(e.bloque)===String(block?.bloque))).sort((a,b)=>(+a.orden||0)-(+b.orden||0))}
function station(code){let s=STATIONS.find(x=>x.codigo===code);return s?`${code} · ${s.estacion}`:code||'—'}
function service(code){let s=SERVICES.find(x=>x.codigo===code);return s?s.descripcion:code||'—'}
function timeOnly(txt){let m=String(txt||'').match(/\d{1,2}:\d{2}/);return m?m[0]:'—'}
function placeOnly(txt){return String(txt||'').replace(/\d{1,2}:\d{2}/g,'').trim()||'—'}
function dayTitle(ds){return new Date(ds+'T12:00:00').toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}
function monthLabel(d){return d.toLocaleDateString('es-ES',{month:'long',year:'numeric'})}
function renderCalendar(){let y=current.getFullYear(),m=current.getMonth();let first=new Date(y,m,1);let start=(first.getDay()+6)%7;let days=new Date(y,m+1,0).getDate();let html=`<div class="calhead"><button class="iconbtn" onclick="current.setMonth(current.getMonth()-1);renderAll()">‹</button><div class="monthtitle">${monthLabel(first)}</div><button class="iconbtn" onclick="current.setMonth(current.getMonth()+1);renderAll()">›</button><button class="btn ghost" onclick="goToday()">Hoy</button></div><div class="calendar"><div class="dowgrid">${['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'].map(x=>`<div class="dow">${x}</div>`).join('')}</div><div class="grid">`;for(let i=0;i<start;i++)html+='<div class="day"></div>';for(let d=1;d<=days;d++){let ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;let raw=byDate(ds);if(!raw){html+=`<div class="day"><div class="n">${d}</div></div>`;continue}let e=effective(raw);let b=bestBlock(e);let cls=typeClass(e);let top=isDD(e)?'DD':(cls.includes('rest')?'Descanso':timeOnly(b?.presentacion));let bottom=isDD(e)?'Detraíble':(cls.includes('rest')?'':timeOnly(b?.finalizacion));html+=`<div class="day ${cls} ${selected===ds?'selected':''}" onclick="selectDay('${ds}')"><div class="n">${d}</div><div class="turnbox"><div>${top}</div>${bottom?`<div>${bottom}</div>`:''}</div><div class="extra small muted">${e.clave_turno}</div>${e.manual?'<div class="small">✎ mod.</div>':''}</div>`}html+=`</div><div class="legend"><span><i class="sq work"></i>Trabajo</span><span><i class="sq rest"></i>Descanso</span><span><i class="sq dd"></i>DD detraíble</span></div></div>`;if(selected&&byDate(selected))html+=renderDetail(byDate(selected));document.getElementById('calendar').innerHTML=html}
function selectDay(ds){selected=ds;renderAll()} function goToday(){let t=byDate(fmt(new Date())); if(t){current=new Date(t.fecha+'T12:00:00');selected=t.fecha}renderAll()}
function renderDetail(day){day=effective(day);let b=bestBlock(day);let ev=eventsFor(day,b);let start=timeOnly(b?.presentacion),end=timeOnly(b?.finalizacion);let cls=isDD(day)?'dd':'';return `<div class="card"><div class="row between"><div><span class="badge ${cls}">${isDD(day)?'DD detraíble':'Turno '+day.clave_turno}</span><h2>${dayTitle(day.fecha)}</h2><div class="bigtime">${isDD(day)?'DD':`${start} - ${end}`}</div><div class="muted">${b?.jornada?'Duración '+b.jornada:'Duración pendiente'}</div></div><button class="btn primary" onclick="show('changes')">Editar turno</button></div><div class="detail"><div><h3>Resumen</h3><div class="kv"><span class="muted">Presentación</span><b>${b?.presentacion||'—'}</b></div><div class="kv"><span class="muted">Finalización</span><b>${b?.finalizacion||'—'}</b></div><div class="kv"><span class="muted">Tipo</span><b>${b?.tipo||day.tipo_dia}</b></div><div class="kv"><span class="muted">Clave original</span><b>${day.clave_original||day.clave_turno}</b></div><p class="small muted">${b?.detalle||'Pendiente de desarrollo detallado para esta clave.'}</p></div><div><h3>Tareas / eventos</h3><div class="timeline">${ev.length?ev.map(e=>`<div class="event"><div class="time">${e.hora}</div><div><b>${e.accion}</b> ${e.tren?`· Tren ${e.tren}`:''}</div><div class="muted small">${station(e.lugar)} ${e.nota?`· ${e.nota}`:''}</div></div>`).join(''):`<div class="event"><div class="time">${start}</div><div><b>${b?.tipo||day.tipo_dia}</b></div><div class="muted small">${b?.detalle||'Sin eventos cargados todavía'}</div></div>`}</div></div><div><h3>Nota privada</h3><textarea rows="5" placeholder="Añade notas privadas de este día..." oninput="state.notes['${day.fecha}']=this.value;save()">${state.notes[day.fecha]||''}</textarea><p class="small muted">Se guarda solo en este dispositivo.</p></div></div></div>`}
function renderHome(){let today=byDate(fmt(new Date()))||CALENDAR.find(d=>d.tipo_dia==='Trabajo')||CALENDAR[0];selected=selected||today.fecha;document.getElementById('home').innerHTML=`<div class="card notice"><div class="row between"><div><h2>¿Qué hago hoy?</h2><p class="muted">Vista rápida del turno, presentación y finalización.</p></div><button class="btn primary" onclick="show('calendar')">Abrir calendario</button></div></div>${renderDetail(today)}`}
function nextWork(from=new Date()){let base=fmt(from);return CALENDAR.map(effective).find(d=>d.fecha>=base&&!typeClass(d).includes('rest')&&!isDD(d))||CALENDAR.map(effective).find(d=>!typeClass(d).includes('rest')&&!isDD(d))}
function renderSideBoxes(){let n=nextWork();let b=n?bestBlock(n):null;document.getElementById('nextBox').innerHTML=`<div class="small muted">Próxima presentación</div><h3>${n?new Date(n.fecha+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'}):'—'}</h3><div class="bigtime">${timeOnly(b?.presentacion)}</div><div class="small muted">${b?.presentacion?placeOnly(b.presentacion):''}</div>`;document.getElementById('statsBox').innerHTML=statsHtml();document.getElementById('upcomingBox').innerHTML=upcomingHtml();document.getElementById('alertsBox').innerHTML=`<h3>🔔 Avisos</h3><p><b>Presentación ${timeOnly(b?.presentacion)}</b><br><span class="muted small">${n?dayTitle(n.fecha):'Sin próximos turnos'}</span></p>`}
function stats(){let c={trabajo:0,descanso:0,dd:0,vac:0,mod:Object.keys(state.changes).length,min:0};CALENDAR.map(effective).forEach(d=>{let cl=typeClass(d);if(isDD(d))c.dd++;else if(cl.includes('rest'))c.descanso++;else if(cl.includes('vac'))c.vac++;else {c.trabajo++;let b=bestBlock(d);let j=String(b?.jornada||'');let m=j.match(/(\d{1,2}):(\d{2})/);if(m)c.min+=+m[1]*60+ +m[2];}});return c}
function hhmm(min){return `${Math.floor(min/60)}:${String(min%60).padStart(2,'0')}`}
function statsHtml(){let c=stats();return `<h3>Estadísticas</h3><div class="statrow"><span>💼 Días trabajados</span><b>${c.trabajo}</b></div><div class="statrow"><span>🕒 Horas aprox.</span><b>${hhmm(c.min)}</b></div><div class="statrow"><span>⚠️ DD detraíbles</span><b style="color:var(--ddText)">${c.dd}</b></div><div class="statrow"><span>🛏️ Descansos</span><b>${c.descanso}</b></div><div class="statrow"><span>✎ Modificados</span><b>${c.mod}</b></div>`}
function upcomingHtml(){let base=fmt(new Date());let rows=CALENDAR.map(effective).filter(d=>d.fecha>=base&&!typeClass(d).includes('rest')&&!isDD(d)).slice(0,4);if(!rows.length)rows=CALENDAR.map(effective).filter(d=>!typeClass(d).includes('rest')&&!isDD(d)).slice(0,4);return `<h3>Próximos turnos</h3>${rows.map(d=>{let b=bestBlock(d);return `<div class="statrow"><span>${new Date(d.fecha+'T12:00:00').toLocaleDateString('es-ES',{day:'numeric',month:'short'})}<br><span class="small muted">Turno ${d.clave_turno}</span></span><b>${timeOnly(b?.presentacion)} - ${timeOnly(b?.finalizacion)}</b></div>`}).join('')}`}
function renderTurns(){let keys=[...new Set(BLOCKS.map(b=>b.turno))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));document.getElementById('turns').innerHTML=`<div class="card"><h2>Turnos y tareas</h2><p class="muted">Desarrollo leído del marco. Pulsa una clave para ver bloques y eventos.</p><input id="turnSearch" placeholder="Buscar clave, estación, tren..." oninput="renderTurnList(this.value)"><div id="turnList"></div></div>`;renderTurnList('')}
function renderTurnList(q=''){q=q.toLowerCase();let keys=[...new Set(BLOCKS.map(b=>b.turno))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true}));let html='';keys.filter(k=>!q||String(k).toLowerCase().includes(q)||BLOCKS.filter(b=>b.turno===k).some(b=>JSON.stringify(b).toLowerCase().includes(q))||EVENTS.filter(e=>e.turno===k).some(e=>JSON.stringify(e).toLowerCase().includes(q))).slice(0,80).forEach(k=>{let blocks=BLOCKS.filter(b=>b.turno===k);html+=`<details class="card"><summary><b>Turno ${k}</b> · ${blocks.length} bloque(s)</summary>${blocks.map(b=>`<div style="border-top:1px solid var(--line);padding:10px 0"><span class="badge">${b.dias}</span> <b>${b.tipo}</b><div>${b.presentacion||'—'} → ${b.finalizacion||'—'} · ${b.jornada||'—'}</div><p class="small muted">${b.detalle||''}</p></div>`).join('')}</details>`});document.getElementById('turnList').innerHTML=html||'<p class="muted">Sin resultados.</p>'}
function renderStats(){document.getElementById('stats').innerHTML=`<div class="card">${statsHtml()}</div>`}
function renderChanges(){let ds=selected||CALENDAR[0].fecha;let day=effective(byDate(ds));document.getElementById('changes').innerHTML=`<div class="card"><h2>Cambiar turno</h2><label>Fecha</label><input type="date" id="chgDate" value="${ds}" onchange="selected=this.value;renderChanges()"><label>Nueva clave</label><input id="chgTurn" value="${day.clave_turno}"><label>Motivo</label><input id="chgReason" placeholder="Cambio, licencia, ajuste manual..." value="${day.motivo||''}"><div class="row" style="margin-top:10px"><button class="btn primary" onclick="applyChange()">Guardar cambio</button><button class="btn ghost" onclick="resetChange()">Restaurar original</button></div></div><div class="card"><h3>Cambios guardados</h3>${Object.entries(state.changes).length?Object.entries(state.changes).map(([d,c])=>`<p><b>${dayTitle(d)}</b>: ${c.original} → <b>${c.turno}</b><br><span class="muted small">${c.motivo||''}</span></p>`).join(''):'<p class="muted">No hay cambios manuales.</p>'}</div>`}
function applyChange(){let ds=document.getElementById('chgDate').value;let original=byDate(ds);if(!original)return alert('Fecha fuera del cuadro cargado');state.changes[ds]={turno:document.getElementById('chgTurn').value.trim(),motivo:document.getElementById('chgReason').value.trim(),tipo:'Trabajo',original:original.clave_turno};selected=ds;save();renderAll()}

function renderSettings(){document.getElementById('settings').innerHTML=`<div class="card"><h2>Ajustes</h2><div class="row"><button class="btn primary" onclick="installApp()">Instalar aplicación</button><button class="btn" onclick="toggleTheme()">Modo claro/oscuro</button><button class="btn ghost" onclick="exportData()">Exportar copia</button><button class="btn ghost" onclick="localStorage.removeItem('appTurnosState');location.reload()">Borrar datos locales</button></div><p class="muted small">La app pública no contiene tus PDF privados. Tus notas y cambios manuales se guardan solo en este dispositivo.</p></div>`}
function toggleTheme(){document.body.classList.toggle('dark');state.theme=document.body.classList.contains('dark')?'dark':'light';save()}
function installApp(){if(deferredPrompt){deferredPrompt.prompt();deferredPrompt=null}else alert('En Chrome: menú ⋮ → Añadir a pantalla de inicio.')}
function exportData(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='appturnos-copia.json';a.click()}
function refreshData(){alert('Próximo paso: importador desde archivo privado. De momento los datos cargados están integrados en esta versión.')}
function renderAll(updateHome=true){if(updateHome)renderHome();renderCalendar();renderTurns();renderStats();renderChanges();renderSettings();renderSideBoxes();renderNav()}
if(state.theme==='dark')document.body.classList.add('dark');show(state.lastView||'calendar');
</script></body></html>
